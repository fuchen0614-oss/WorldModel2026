# ObsWorld Stage2 main EarthNet2021 training config.
# Main experiment first: full model z_context + D + G + h -> future observations.

model:
  # This file is the retained matched Direct-DGH baseline, not recursive rollout.
  mode: direct
  use_phi_encoder: true
  compute_latent_targets: false
  conditions:
    use_D: true
    use_G: true
    use_h: true

  encoder:
    type: MultiModalViTEncoderFiLM
    from_checkpoint: /csy-mix02/cog8/zjliu17/Agent/WorldModel2026/checkpoints/stage1_5_dual_conditioned_vits_60k/checkpoint_step_60000.pt
    freeze: true
    unfreeze_at_step: 5000
    unfreeze_last_blocks: 2
    unfreeze_state_projector: true
    img_size: 256
    s1_channels: 2
    s2_channels: 12
    patch_size: 16
    embed_dim: 384
    depth: 12
    num_heads: 6
    mlp_ratio: 4.0
    dropout: 0.0
    phi_dim: 384
    use_film: true
    use_cross_attention: false
    film_start_layer: 8

  phi_encoder:
    type: PureImagingConditionEncoder
    embed_dim: 384
    sun_dim: 64
    sar_geom_dim: 64
    dropout: 0.0
    condition_dropout: 0.0
    use_sar_geometry: true

  state_projector:
    type: SpatialStateProjector
    in_dim: 384
    state_dim: 256
    hidden_dim: 512

  band_adapter:
    type: EarthNetInputAdapter
    in_channels: 4
    out_channels: 12
    hidden_channels: 32
    mode: linear
    # EarthNet [blue, green, red, nir(B8A)] -> Stage1.5 [B02, B03, B04, B8A].
    source_to_canonical: [1, 2, 3, 8]

  context_aggregator:
    type: ContextStateAggregator
    state_dim: 256
    hidden_dim: 256
    dropout: 0.0
    max_context_frames: 32

  driver_encoder:
    type: DriverEncoder
    in_dim: 9
    hidden_dim: 64
    out_dim: 32
    dropout: 0.0

  horizon_encoder:
    type: HorizonEncoder
    out_dim: 16
    hidden_dim: 32
    max_h_days: 100.0

  geo_tokenizer:
    type: GeoTokenizer
    in_channels: 1
    geo_dim: 16
    img_size: 256
    patch_size: 16

  dynamics:
    type: StateDynamicsModule
    latent_dim: 256
    dynamics_type: transformer
    driver_dim: 32
    geo_dim: 16
    time_dim: 16
    hidden_dim: 256
    num_layers: 2
    num_heads: 4
    dropout: 0.0

  decoder:
    type: EarthNetObservationDecoder
    in_dim: 256
    out_channels: 4
    patch_size: 16
    img_size: 256
    depth: 3
    num_heads: 4
    decoder_embed_dim: 192
    mlp_ratio: 4.0
    dropout: 0.0
    decoder_mode: transformer
    predict_logvar: false
    output_activation: sigmoid

data:
  dataset: earthnet2021x
  root: /csy-mix02/cog8/zjliu17/Agent/TrainData/EarthNet2021
  split: train
  data_format: netcdf
  file_glob: "**/*.nc"
  context_frames: 10
  target_frames: 20
  frame_interval_days: 5
  max_h_days: 100
  model_img_size: 256
  eval_img_size: 128
  image_channels: 4
  target_channels: 4
  # EarthNet2021x uses s2_B02/B03/B04/B8A and s2_mask.
  cloud_mask_channel: 0
  cloud_mask_is_invalid: true
  # E-OBS is daily; S2 uses day indices 4, 9, ..., 149.
  meso_steps_per_image: 5
  netcdf_s2_offset_days: 4
  # eobs_qq is W/m2; 0.0864 converts a daily mean to MJ/m2/day.
  netcdf_solar_scale: 0.0864
  netcdf_dem_variables: [nasa_dem, alos_dem, cop_dem]
  # Official EarthNet overlap is the central 2x2 part of the 80x80 meso window.
  meso_crop_size: 2
  elevation_channel: 0
  elevation_scale: 2000.0
  validation_fraction: 0.1
  validation_group: tile
  split_seed: 42
  use_train_holdout: true
  # Formal runs pass an immutable train manifest and set require_manifest=true.
  manifest_path: null
  require_manifest: false
  verify_manifest_sizes: false
  verify_manifest_hashes: false
  # Set after running scripts/build_earthnet_dgh_stats.py.
  dgh_stats_path: null
  # EarthNet2021x contains humidity and radiation, so no ERA5 sidecar is needed.
  external_driver_root: null
  external_driver_required: false
  disabled_driver_features: []
  normalize: true
  strict: true
  batch_size: 2
  num_workers: 4
  band_spec:
    # Official EarthNet order, verified against the published dataset loader.
    input_bands: [blue, green, red, nir]
    target_bands: [blue, green, red, nir]
    red_band: red
    nir_band: nir
    scale_factor: 10000.0
    auto_scale: true
  driver_spec:
    # The NetCDF loader builds this physical order from embedded E-OBS fields.
    channel_map:
      precipitation: 0
      temperature: 1
      vpd: 2
      solar_radiation: 3

training:
  seed: 42
  max_steps: 50000
  warmup_steps: 2000
  gradient_accumulation_steps: 1
  horizons_per_sample: 6
  grad_clip: 1.0
  require_dgh_stats: true
  require_all_driver_features: true
  # EarthNet2021x E-OBS variables contain window-level gaps: a cumulative
  # forcing window is marked invalid when any day in that window is missing.
  # D_mask exposes those gaps to the model, so formal checks require each
  # feature to be present with high coverage rather than exact 100% validity.
  min_driver_valid_fraction: 0.90
  require_geo: true

validation:
  split: val
  interval: 1000
  batch_size: 2
  num_workers: 4
  # Evenly spaced deterministic monitor subset; final reporting uses eval script.
  max_samples: 512
  max_batches: 0
  primary_metric: MAE
  mode: min

loss:
  obs_loss: huber
  weights:
    obs: 1.0
    ndvi: 0.5
    latent: 0.0
    delta: 0.0
    smooth: 0.0

optimizer:
  name: adamw
  lr: 0.0001
  backbone_lr: 0.00001
  min_lr: 0.000001
  backbone_min_lr: 0.000001
  weight_decay: 0.05
  betas: [0.9, 0.95]

checkpoint_dir: /csy-mix02/cog8/zjliu17/Agent/WorldModel2026/checkpoints/stage2_earthnet_main
log_dir: /csy-mix02/cog8/zjliu17/Agent/WorldModel2026/logs/stage2_earthnet_main
resume_from: null
checkpoint_interval: 5000
log_interval: 50
