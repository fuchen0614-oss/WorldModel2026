# ============================================================
# Stage 1 单卡训练配置（直接 python 启动）
# 用法: python train/train_stage1_ssl4eo.py --config 本文件
# ============================================================

# ---------- 训练超参 ----------
max_steps: 10                # 总训练步数（smoke test 用 10，正式训练改大）
learning_rate: 0.0001        # 必须写成 0.0001 而非 1e-4（YAML 会把 1e-4 解析成字符串）
optimizer: adamw
weight_decay: 0.05
warmup_steps: 0
loss_type: masked_mse        # 可选: masked_mse / masked_l1 / charbonnier
precision: bf16              # bf16 混合精度
log_interval: 2

# ---------- 路径 ----------
checkpoint_dir: /csy-mix02/cog8/zjliu17/Agent/WorldModel2026/checkpoints
log_dir: /csy-mix02/cog8/zjliu17/Agent/WorldModel2026/logs

# ---------- 单卡模式（无 FSDP） ----------
distributed: false

# ---------- 数据配置 ----------
data:
  data_root: /csy-mix02/cog8/zjliu17/Agent/TrainData/SSL4EO-S12-v1.1
  modality: S2L2A            # 输入模态：S2L2A(12波段) / S2RGB(3波段) 可切换
  split: train
  batch_size: 8
  num_workers: 0
  random_season: true
  normalize: true
  shard_pattern: "ssl4eos12_shard_{000001..000005}.tar"

# ---------- 模型配置 ----------
model:
  encoder:
    img_size: 256
    in_channels: 12          # S2L2A=12，切 S2RGB 时改成 3
    patch_size: 16
    embed_dim: 256
    depth: 4
    num_heads: 4
  decoder:
    in_dim: 256
    out_channels: 12         # 须与 encoder.in_channels 一致
    depth: 2
    img_size: 256
