# Tiny non-formal physical4 smoke configuration.
_base_: stage2_earthnet_v2_smoke.yaml

protocol:
  driver_protocol: physical4_v1

model:
  forecast_mode: direct_path_physical4
  driver_protocol: physical4_v1
  interval_driver_encoder:
    input_dim: 4
    feature_names: [precip_sum_5d, temp_mean_5d, vpd_mean_5d, srad_sum_5d]

data:
  driver_protocol: physical4_v1
  conditioning_stats_path: null
  require_conditioning_stats: false

checkpoint_dir: outputs/stage2_earthnet_v2_smoke_physical4/checkpoints
log_dir: outputs/stage2_earthnet_v2_smoke_physical4/logs
